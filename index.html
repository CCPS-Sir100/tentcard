<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>壓克力三角立牌內頁產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#2eb87a;--blue:#3a9fd6;--coral:#ff6b6b;--ink:#1a202c;--soft:#4a5568;--border:#bee3f8;--panel:#f8fdff;--radius:10px}
body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;font-size:16px;background:linear-gradient(135deg,#e8f4fd,#e6f7f0);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(90deg,#1a9e6a,#2d8abf);color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 14px rgba(46,184,122,0.3);flex-shrink:0}
.logo-wrap img{width:46px;height:46px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))}
.header-text h1{font-size:17px;font-weight:900;letter-spacing:1px;line-height:1.3}
.header-text p{font-size:11px;opacity:.8;margin-top:2px}
.tab-bar{display:flex;background:#1a202c;flex-shrink:0;border-bottom:3px solid #2eb87a}
.tab-btn{flex:1;padding:12px 4px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);background:none;border:none;cursor:pointer;position:relative;transition:color .2s}
.tab-btn.active{color:#2eb87a}
.tab-btn.active::after{content:"";position:absolute;bottom:-3px;left:0;right:0;height:3px;background:#2eb87a}
.tab-panel{display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:14px}
.tab-panel.active{display:flex}
#panel-preview{background:linear-gradient(135deg,#dff0fa,#d4f0e8);align-items:center;gap:16px}
.sec-title{font-size:14px;font-weight:900;letter-spacing:1px;color:var(--teal);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:"";display:inline-block;width:4px;height:16px;background:var(--teal);border-radius:3px}
.badge{background:#2eb87a;color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.badge.blue{background:#3a9fd6}
label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}
textarea,select,input[type=number],input[type=text]{width:100%;font-family:inherit;font-size:14px;background:white;border:2px solid #bee3f8;border-radius:var(--radius);padding:9px 11px;color:var(--ink);outline:none;transition:border-color .2s;line-height:1.8}
textarea:focus,select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(58,159,214,0.18)}
textarea{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:13px;color:#744210;line-height:1.9;background:#fffbeb;border-left:4px solid #f6ad55;padding:8px 12px;border-radius:0 8px 8px 0}
.hint strong{color:#c05621}
.sub-hint{font-size:13px;color:#276749;line-height:1.7;background:#f0fff4;border-left:4px solid var(--teal);padding:7px 11px;border-radius:0 8px 8px 0}
.btn{display:block;width:100%;padding:13px;font-family:inherit;font-size:16px;font-weight:900;letter-spacing:1px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;box-shadow:0 3px 8px rgba(0,0,0,0.12)}
.btn-green{background:linear-gradient(135deg,#2eb87a,#27a06a);color:white}
.btn-blue{background:linear-gradient(135deg,#3a9fd6,#2d8abf);color:white;margin-top:10px}
.btn-gdocs{background:linear-gradient(135deg,#4285f4,#1a73e8);color:white;margin-top:10px}
.btn-orange{background:linear-gradient(135deg,#f6a623,#e8920f);color:white;box-shadow:0 3px 8px rgba(246,166,35,0.35)}
.btn-gray{background:linear-gradient(135deg,#718096,#4a5568);color:white}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sm-red{width:100%;padding:9px;font-family:inherit;font-size:14px;font-weight:700;background:#fff0f0;color:#c53030;border:2px solid #feb2b2;border-radius:8px;cursor:pointer}
.sm-blue{width:100%;padding:9px;font-family:inherit;font-size:14px;font-weight:700;background:#e8f4fd;color:#2d6a9f;border:2px solid #90cdf4;border-radius:8px;cursor:pointer}
.status{font-size:14px;text-align:center;min-height:20px;font-weight:500;margin-top:6px}
.status.ok{color:var(--teal)}.status.err{color:var(--coral)}
.batch-box{background:#f0f8ff;border:2px solid #bee3f8;border-radius:10px;padding:14px}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.bg2 > div{min-width:0}
.preview-empty{margin:auto;text-align:center;color:#7a9fb0;padding:40px 0}
.preview-empty .icon{font-size:56px;margin-bottom:14px}
.preview-empty p{font-size:15px;line-height:2}
.page-wrap{position:relative;background:white;box-shadow:0 4px 20px rgba(58,159,214,0.12);border-radius:4px}
.page-label{position:absolute;top:-20px;left:0;font-size:12px;color:#4a7a9b;font-weight:700}
canvas.page-canvas{display:block;width:100%;height:auto;border-radius:4px}
.preview-info{font-size:14px;color:#4a7a9b;font-weight:700;align-self:flex-start}
#overlay{display:none;position:fixed;inset:0;background:rgba(26,32,44,.7);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:white;font-size:16px;backdrop-filter:blur(3px)}
#overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:768px){
  .tab-bar{display:none}
  .tab-panel{display:flex!important;padding:18px 16px}
  body{overflow:hidden;height:100vh}
  .workspace{display:grid;grid-template-columns:340px 300px 1fr;flex:1;min-height:0;overflow:hidden}
  #panel-text{background:var(--panel);border-right:2px solid #bee3f8;overflow-y:auto}
  #panel-settings{background:#f0fdf8;border-right:2px solid #bee3f8;overflow-y:auto}
  #panel-preview{overflow-y:auto}
}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div><div id="overlay-msg">處理中…</div></div>

<!-- 卡片文字 -->
<div class="tab-panel active" id="panel-text">

    <div class="g2" style="margin-top:8px;gap:8px">
      <button class="sm-red" onclick="clearTA()">🗑 全部清除</button>

  </div>
</div>

<!-- 批次號碼 -->
<div class="tab-panel" id="panel-batch" style="background:var(--panel)">
  <div class="batch-box">
    <div class="sec-title" style="color:#2d8abf"><span class="badge blue">2</span>產生批次號碼 <span style="font-size:12px;font-weight:400;color:#718096;margin-left:4px">（可跳過）</span></div>
    <div class="bg2">
      <div><label style="font-size:13px">前綴（可空白）</label><input type="text" id="bp" placeholder="例如：第"></div>

      <div><label style="font-size:13px">起始數字</label><input type="number" id="b1" value="1" min="0" max="999"></div>
      <div><label style="font-size:13px">結束數字</label><input type="number" id="b2" value="31" min="0" max="999"></div>
    </div>

      <label style="font-size:13px;margin-bottom:6px">數字格式</label>
      <div style="display:flex;flex-direction:column;gap:5px">

<script>

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  ['text','batch','settings','preview'].forEach(function(n){
    document.getElementById('panel-'+n).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
}

var DPR = 2;
var PPcm = 37.795 * DPR;
var A4W  = 21.0 * PPcm;
var A4H  = 29.7 * PPcm;

function FONT(size) {
  return '900 ' + size + 'px "Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif';
}

var fontOK = false;
function warmFont() {
  if (fontOK) return Promise.resolve();
  return document.fonts.ready.then(function() {
    return Promise.all([
      document.fonts.load('900 80px "Noto Sans TC"', '第試場服務台簽到校長處長'),
      document.fonts.load('900 80px "Noto Sans TC"', '收發試題答案卡補發准考證'),
      document.fonts.load('900 80px "Noto Sans TC"', '屏東中正洪啓元政風廠商'),
    ]);
  }).then(function() {
    var passes = [0,1,2];
    return passes.reduce(function(p) {
      return p.then(function() {
        var c = document.createElement('canvas');
        c.width = 1200; c.height = 400;
        var x = c.getContext('2d');
        x.font = FONT(80);
        x.fillText('第試場服務台校長處長科員政風收發試題答案卡補發准考證簽到廠商屏東中正洪啓元', 10, 200);
        x.getImageData(0, 0, 1, 1);
        return sleep(60);
      });
    }, Promise.resolve());
  }).then(function() { fontOK = true; });
}
warmFont();

function actualWidth(text, size, maxW) {
  var oc = document.createElement('canvas');
  oc.width = Math.ceil(maxW) + 300;
  oc.height = size * 2 + 20;
  var ctx = oc.getContext('2d');
  ctx.font = FONT(size);
  ctx.fillStyle = '#000';
  ctx.textBaseline = 'top';
  ctx.fillText(text, 20, 5);
  var d = ctx.getImageData(0, 0, oc.width, oc.height).data;
  var r = 0;
  for (var x = oc.width - 1; x >= 0; x--) {
    for (var y = 0; y < oc.height; y++) {
      if (d[(y * oc.width + x) * 4 + 3] > 10) { r = x; break; }
    }
    if (r) break;
  }
  return Math.max(r > 20 ? r - 20 + 16 : 0, ctx.measureText(text).width * 1.08);
}

function calcFontSize(label, cW, cH) {
  var mode = document.getElementById('fsm').value;
  var lines = label.split('|');
  var hH = cH / 2;
  var ratios = {
    auto:   {w:.58, h:.56, s:240},
    small:  {w:.48, h:.46, s:160},
    medium: {w:.63, h:.61, s:220},
    large:  {w:.70, h:.68, s:255},
    xl:     {w:.76, h:.74, s:275}
  };
  var r = ratios[mode] || ratios.auto;
  var maxW = Math.min(cW * r.w, cW * 0.85);
  var maxH = Math.min(hH * r.h, hH * 0.85);
  for (var s = r.s; s >= 28; s -= 4) {
    if (lines.length * s * 1.35 > maxH) continue;
    var w = Math.max.apply(null, lines.map(function(l){ return actualWidth(l, s, cW); }));
    if (w <= maxW) return s;
  }
  return 28;
}

function drawCard(ctx, label, x, y, cW, cH, fs) {
  var hH = cH / 2;
  var lines = label.split('|');
  var fontStr = FONT(fs);
  var lineH = fs * 1.3;
  var totalH = lines.length * lineH;

  var mCtx = document.createElement('canvas').getContext('2d');
  mCtx.font = fontStr;
  var widths = lines.map(function(l){ return mCtx.measureText(l).width; });

  function makeTile(flip) {
    var oc = document.createElement('canvas');
    oc.width = Math.ceil(cW); oc.height = Math.ceil(hH);
    var ox = oc.getContext('2d');
    ox.font = fontStr; ox.fillStyle = '#111'; ox.textBaseline = 'middle';
    ox.translate(cW / 2, hH / 2);
    if (flip) ox.rotate(Math.PI);
    lines.forEach(function(line, i) {
      ox.fillText(line, -widths[i]/2, -totalH/2 + i*lineH + lineH/2);
    });
    return oc;
  }

  ctx.drawImage(makeTile(false), x, y + hH);
  ctx.drawImage(makeTile(true),  x, y);

  ctx.save();
  ctx.strokeStyle = '#111'; ctx.lineWidth = DPR * 1.5; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.rect(x, y, cW, cH);
  ctx.moveTo(x, y+hH); ctx.lineTo(x+cW, y+hH);
  ctx.stroke();
  ctx.restore();
}

function drawPage(canvas, pair, cWcm, cHcm) {
  var cW = cWcm * PPcm, cH = cHcm * PPcm;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  var xOff = (A4W - cW) / 2;
  var yOff = (A4H - cH * 2) / 2;
  pair.forEach(function(label, j) {
    drawCard(ctx, label, xOff, yOff + j*cH, cW, cH, calcFontSize(label, cW, cH));
  });
  ctx.save();
  ctx.setLineDash([DPR*10, DPR*6]);
  ctx.strokeStyle = '#999'; ctx.lineWidth = DPR * 0.8;
  ctx.beginPath();
  ctx.moveTo(0, yOff+cH); ctx.lineTo(A4W, yOff+cH);
  ctx.stroke();
  ctx.restore();
}

var pages = [];

function generatePreview() {
  setStatus('⏳ 字型載入中…');
  return warmFont().then(function(){ return sleep(200); }).then(function() {
    var raw = document.getElementById('ta').value.trim();
    if (!raw) { setStatus('請先輸入文字！','err'); return; }
    var labels = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
    var cWcm = parseFloat(document.getElementById('cw').value) || 17.4;
    var cHcm = parseFloat(document.getElementById('ch').value) || 13.0;

    var area = document.getElementById('panel-preview');
    var em = document.getElementById('emptyMsg');
    if (em) em.remove();
    area.querySelectorAll('.page-wrap,.preview-info').forEach(function(el){ el.remove(); });
    pages = [];

    var info = document.createElement('p');
    info.className = 'preview-info';
    info.textContent = '共 ' + labels.length + ' 張立牌，' + Math.ceil(labels.length/2) + ' 頁 A4';
    area.appendChild(info);

    var SCALE = 460 / (A4W / DPR);
    var allData = [];
    for (var i = 0; i < labels.length; i += 2) {
      var pair = labels.slice(i, i+2);
      var canvas = document.createElement('canvas');
      canvas.width = A4W; canvas.height = A4H;
      canvas.className = 'page-canvas';
      drawPage(canvas, pair, cWcm, cHcm);
      allData.push({canvas: canvas, pair: pair});
    }

    return sleep(250).then(function() {
      allData.forEach(function(d){ drawPage(d.canvas, d.pair, cWcm, cHcm); });
      allData.forEach(function(d, i) {
        var wrap = document.createElement('div');
        wrap.className = 'page-wrap';
        wrap.style.width = (A4W/DPR*SCALE) + 'px';
        var lbl = document.createElement('div');
        lbl.className = 'page-label';
        lbl.textContent = '第 ' + (i+1) + ' 頁';
        wrap.appendChild(lbl);
        wrap.appendChild(d.canvas);
        area.appendChild(wrap);
        pages.push(d.canvas);
      });
      document.getElementById('dlBtn').disabled = false;
      document.getElementById('gdBtn').disabled = false;
      setStatus('✅ 預覽完成，共 ' + Math.ceil(labels.length/2) + ' 頁', 'ok');
      var tabs = document.querySelectorAll('.tab-btn');
      if (tabs[3]) switchTab('preview', tabs[3]);
    });
  });
}

function downloadPDF() {
  if (!pages.length) { setStatus('請先預覽！','err'); return; }
  showOverlay(true,'正在產生 PDF…');
  return loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js').then(function() {
    var pdf = new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var chain = Promise.resolve();
    pages.forEach(function(pg, i) {
      chain = chain.then(function() {
        if (i > 0) pdf.addPage();
        pdf.addImage(pg.toDataURL('image/jpeg',0.95),'JPEG',0,0,210,297);
        showOverlay(true,'正在產生 PDF… ('+(i+1)+'/'+pages.length+')');
        return sleep(10);
      });
    });
    return chain.then(function() {
      pdf.save('壓克力三角立牌.pdf');
      clearTA();
      resetPreview();
      setStatus('✅ PDF 已下載！','ok');
      showOverlay(false);
    });
  }).catch(function(e){ setStatus('失敗：'+e.message,'err'); showOverlay(false); });
}

function openPrintPreview() {
  if (!pages.length) { setStatus('\u8acb\u5148\u9810\u89bd\uff01','err'); return; }
  var raw = document.getElementById('ta').value.trim();
  var labels = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);

  // 把每頁 canvas 轉成 base64 圖片
  var imgs = pages.map(function(c){ return c.toDataURL('image/png'); });

  // 可選字體清單（常見中文字體）
  var fonts = [
    '\u6a19\u6977\u9ad4',      // 標楷體
    '\u65b0\u7d30\u660e\u9ad4', // 新細明體
    '\u5fae\u8edf\u6b63\u9ed1\u9ad4', // 微軟正黑體
    '\u9ed1\u9ad4',             // 黑體
    'Arial','Georgia','Times New Roman'
  ];

  // 字體選單 HTML
  var fontOptions = fonts.map(function(f){
    return '<option value="' + f + '">' + f + '</option>';
  }).join('');

  // 每頁圖片 HTML
  var imgHtml = imgs.map(function(src, i){
    return '<div class="page" id="pg'+i+'">' +
      '<canvas id="cv'+i+'" style="max-width:100%;display:block;margin:0 auto;"></canvas>' +
      '</div>';
  }).join('');

  // innerJS：字體重繪功能（用 canvas 重繪文字）
  // 改用 canvas 重繪，確保倒反文字正確
  var cWcm = parseFloat(document.getElementById('cw').value) || 17.4;
  var cHcm = parseFloat(document.getElementById('ch').value) || 13.0;

  // 把 labels 和 fontSize 資訊傳進去
  var labelsJson = JSON.stringify(labels);
  var modeVal = document.getElementById('fsm').value;

  // 用 img 標籤直接顯示 canvas PNG，不需要重繪
  var imgTags = imgs.map(function(src, i){
    return '<div class="page"><img src="' + src + '" style="max-width:100%;display:block;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,0.15);"></div>';
  }).join('');

  var css = [
    '@media print{.bar{display:none!important}.content{margin-top:0!important} .page{page-break-after:always;margin:0!important;padding:0!important}}',
    'body{margin:0;background:#ccc;font-family:"Microsoft JhengHei",sans-serif}',
    '.bar{position:fixed;top:0;left:0;right:0;background:#2d3748;color:white;',
    'padding:10px 20px;display:flex;align-items:center;gap:12px;z-index:100;',
    'box-shadow:0 2px 8px rgba(0,0,0,0.3);flex-wrap:wrap}',
    '.bar h2{margin:0;font-size:14px;flex:1;min-width:120px}',
    'select{padding:7px 10px;border-radius:6px;border:none;font-size:14px;font-weight:700;cursor:pointer}',
    '.pb{padding:8px 16px;background:#2eb87a;color:white;border:none;border-radius:6px;',
    'font-size:14px;font-weight:900;cursor:pointer}',
    '.tip{background:#2d3748;color:#a0aec0;padding:6px 20px;font-size:12px;line-height:1.8;',
    'position:fixed;top:52px;left:0;right:0;z-index:99}',
    '.content{margin-top:90px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px}',
    '.page{background:white}'
  ].join('');

  var innerJS2 = [
    'var fontSel=document.getElementById("fontSel");',
    'var imgs=document.querySelectorAll(".page img");',
    'function applyFont(){',
    '  var f=fontSel.value;',
    '  imgs.forEach(function(img){img.style.fontFamily=f;});',
    '  document.getElementById("fontNote").textContent=',
    '    "\u76ee\u524d\u5716\u7247\u6a21\u5f0f\uff0c\u5b57\u9ad4\u5df2\u5167\u5d4c\u5728\u5716\u7247\u88e1\uff0c\u9078\u5b57\u9ad4\u4e0d\u6703\u6539\u8b8a\u9810\u89bd\u3002\u8acb\u76f4\u63a5\u5217\u5370\uff0cPDF\u5b57\u9ad4\u5df2\u56fa\u5b9a\u3002";',
    '}',
    'function doPrint(){window.print();}'
  ].join('');

  var pg = '<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">' +
    '<title>\u58d3\u514b\u529b\u4e09\u89d2\u7acb\u724c - \u5217\u5370\u9810\u89bd</title>' +
    '<style>' + css + '</style></head><body>' +
    '<div class="bar">' +
    '<h2>\ud83d\uddb8 \u58d3\u514b\u529b\u4e09\u89d2\u7acb\u724c\uff08\u5171 '+labels.length+' \u5f35\uff09</h2>' +
    '<button class="pb" onclick="doPrint()">\ud83d\udda8 \u5217\u5370</button>' +
    '</div>' +
    '<div class="tip">' +
    '\u2139\ufe0f \u5b57\u9ad4\u5df2\u56fa\u5b9a\u5728\u5716\u7247\u88e1\u3002\u82e5\u8981\u66f4\u63db\u5b57\u9ad4\uff0c\u8acb\u56de\u4e3b\u7a0b\u5f0f\u9078\u64c7\u5b57\u9ad4\u5f8c\u518d\u9810\u89bd\u3002\u78ba\u8a8d\u7248\u9762\u5f8c\u6309\u300c\ud83d\udda8 \u5217\u5370\u300d\u3002' +
    '</div>' +
    '<div class="content">' + imgTags + '</div>' +
    '<scri'+'pt>' + innerJS2 + '</scri'+'pt>' +
    '</body></html>';

  var blob = new Blob([pg], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(function(){ URL.revokeObjectURL(url); }, 120000);
  setStatus('\u2705 \u5df2\u958b\u555f\u5217\u5370\u9810\u89bd\uff0c\u78ba\u8a8d\u5f8c\u6309\u5217\u5370\u5373\u53ef','ok');
}

function clearTA() {
  document.getElementById('ta').value = '';
  setStatus('\u5df2\u6e05\u9664','ok');
}

function resetPreview() {
  var area = document.getElementById('panel-preview');
  area.querySelectorAll('.page-wrap,.preview-info').forEach(function(el){ el.remove(); });
  if (!document.getElementById('emptyMsg')) {
    var em = document.createElement('div');
    em.id = 'emptyMsg'; em.className = 'preview-empty';
    em.innerHTML = '<div class="icon">\ud83d\uddc2\ufe0f</div><p>\u8f38\u5165\u6587\u5b57\u5f8c<br>\u9ede\u300c\u2463\u8a2d\u5b9a\u8f38\u51fa\u300d<br>\u6309\u300c\u9810\u89bd\u5361\u7247\u300d</p>';
    area.appendChild(em);
  }
  pages = [];
  document.getElementById('dlBtn').disabled = true;
  document.getElementById('gdBtn').disabled = true;
}

function insertPipe() {
  var ta = document.getElementById('ta');
  var s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.substring(0,s) + '|' + ta.value.substring(e);
  ta.selectionStart = ta.selectionEnd = s + 1;
  ta.focus();
}

function toZH(n) {
  var d = ['\u96f6','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d','\u4e03','\u516b','\u4e5d'];
  if (n===0) return d[0];
  if (n<10) return d[n];
  if (n<20) return n===10 ? '\u5341' : '\u5341'+d[n%10];
  var r='', s=String(n), u=['','\u5341','\u767e','\u5343'];
  for(var i=0;i<s.length;i++){
    var v=parseInt(s[i]), u2=u[s.length-1-i];
    if(v) r+=d[v]+u2;
    else if(r.slice(-1)!==d[0]) r+=d[0];
  }
  return r.replace(/\u96f6+$/,'');
}

function batchFill(mode) {
  var s=parseInt(document.getElementById('b1').value);
  var e=parseInt(document.getElementById('b2').value);
  var pre=document.getElementById('bp').value;
  var suf=document.getElementById('bs').value;
  var fmt=document.querySelector('input[name="nf"]:checked').value;
  if(isNaN(s)||isNaN(e)||s>e){setStatus('\u8acb\u78ba\u8a8d\u6578\u5b57\u7bc4\u570d\uff01','err');return;}
  if(e-s>200){setStatus('\u7bc4\u570d\u6700\u591a200\u500b','err');return;}
  var lines=[];
  for(var i=s;i<=e;i++){
    var num = fmt==='zero' ? String(i).padStart(Math.max(2,String(e).length),'0') :
              fmt==='chinese' ? toZH(i) : String(i);
    lines.push(pre+num+suf);
  }
  var ta=document.getElementById('ta');
  if(mode==='append'&&ta.value.trim()) ta.value=ta.value.trimEnd()+'\n'+lines.join('\n');
  else ta.value=lines.join('\n');
  setStatus('\u2705 \u5df2\u586b\u5165 '+lines.length+' \u884c\uff08'+lines[0]+' \uff5e '+lines[lines.length-1]+'\uff09','ok');
}

function setStatus(msg,type){ var el=document.getElementById('status');el.textContent=msg;el.className='status '+(type||''); }
function showOverlay(show,msg){ document.getElementById('overlay').classList.toggle('show',show);if(msg)document.getElementById('overlay-msg').textContent=msg; }
function loadScript(src){
  if(window.jspdf) return Promise.resolve();
  return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
}
function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

document.getElementById('ta').addEventListener('keydown', function(e){
  if(e.key==='Enter'&&e.ctrlKey) generatePreview();
});

</script>
